<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Halaman Tidak Ditemukan</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='plugin/bootstrap/css/bootstrap.min.css') }}"
    />
    <script src="{{ url_for('static', filename='plugin/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

    <style>
      body {
        height: 100vh;
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .error-container {
        text-align: center;
      }
      .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: #dc3545;
      }
      .error-message {
        font-size: 1.5rem;
        color: #6c757d;
      }
      .back-btn {
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-code">404</div>
      <div class="error-message">
        Oops! Halaman yang kamu cari tidak ditemukan.
      </div>
      <a href="{{ url_for('base.home') }}" class="btn btn-primary back-btn">
        <i class="bi bi-house-door-fill me-2"></i> Kembali ke Dashboard
      </a>
    </div>
  </body>
</html>
