{% extends 'base.html' %} {% block content %}
<h2>Barang dan Jasa</h2>
<hr />
<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-3">
        <h3>Produk</h3>
      </div>
      <div class="col-6" style="justify-items: center">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            id="cari_produk"
            placeholder="Cari Produk"
          />
        </div>
      </div>
      <div class="col-3" style="text-align: right">
        <button class="btn btn-primary" id="tambah_barang_jasa">
          Tambah Barang/Jasa
        </button>
      </div>
    </div>
  </div>
  <div class="card-body">
    <table id="tabel_barang_jasa">
        <tr>
            <th>ID Produk</th>
            <th>Nama Produk</th>
            <th>Jenis</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Aksi</th>
        </tr>
    </table>
  </div>
</div>
{% endblock %}
