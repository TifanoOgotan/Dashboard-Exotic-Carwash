{% extends 'base.html' %} {% block content %}
<h2>Kasir</h2>
<hr />
<div class="card">
  <div class="card-body">
    <input type="hidden" id="edit" value="F" />
    <div class="row mb-3">
      <label for="nopol" class="col col-form-label" style="text-align: right"
        >Nomor Kendaraan</label
      >
      <div class="col">
        <input
          type="text"
          class="form-control"
          id="nopol"
          placeholder="Nomor Kendaraan"
          oninput="this.value = this.value.toUpperCase().replace(/\s/g, '');"
        />
      </div>
      <label
        for="nama_pelanggan"
        class="col col-form-label"
        style="text-align: right"
        >Nama</label
      >
      <div class="col">
        <input
          type="text"
          class="form-control"
          id="nama_pelanggan"
          placeholder="Nama"
          oninput="this.value = this.value.toUpperCase();"
        />
      </div>
      <label
        for="nama_kendaraan"
        class="col col-form-label"
        style="text-align: right"
        >Nama Kendaraan</label
      >
      <div class="col">
        <input
          type="text"
          class="form-control"
          id="nama_kendaraan"
          placeholder="Nama Kendaraan"
          oninput="this.value = this.value.toUpperCase();"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="no_hp" class="col col-form-label" style="text-align: right"
        >Nomor Hp</label
      >
      <div class="col">
        <input
          type="text"
          class="form-control"
          id="no_hp"
          placeholder="Nomor HP"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        />
      </div>
      <label
        for="total_harga"
        class="col col-form-label"
        style="text-align: right"
        >Total Harga</label
      >
      <div class="col">
        <input
          type="text"
          class="form-control"
          id="total_harga"
          placeholder="Total Harga"
          value="0"
          readonly
        />
      </div>
      <label
        for="status_bayar"
        class="col-2 col-form-label"
        style="text-align: right"
        >Pembayaran</label
      >
      <div class="col-2">
        <select class="form-select" id="status_bayar">
          <option selected disabled>-- Pilih Pembayaran --</option>
          <option value="BB">Belum Bayar</option>
          <option value="CS">Cash</option>
          <option value="TF">Transfer</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col-9"></div>
      <div class="col-2">
        <button
          type="button"
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#lovProduk"
          style="width: 100%"
        >
          Tambah Produk
        </button>
      </div>
    </div>
    <div class="row">
      <table
        id="produk"
        class="display table table-light table-striped-columns"
        style="width: 100%"
      >
        <thead>
          <tr>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Jumlah</th>
            <th>Worker</th>
            <th>Total</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="row">
      <div class="col-9"></div>
      <div class="col-2">
        <button
          type="button"
          class="btn btn-success"
          style="width: 100%"
          onclick="simpanTransaksi()"
        >
          Simpan Transaksi
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal LOV Tambah Produk-->
<div
  class="modal fade"
  id="lovProduk"
  tabindex="-1"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">LOV Produk</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <table
          id="lov_produk"
          class="display table table-light table-striped-columns"
          style="width: 100%"
        >
          <thead>
            <tr>
              <th>Nama Produk</th>
              <th>Harga</th>
              <th>Stok</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block script %}
<script>
  $(document).ready(function () {
    const lov_produk = $("#lov_produk").DataTable({
      scrollY: "400px",
      scrollCollapse: true,
      paging: false,
      processing: true,
      serverSide: false, // jika ingin server-side true, tinggal ubah ini dan backendnya,
      ordering: false,
      ajax: {
        url: "/produk/data",
        type: "POST",
        dataSrc: function (json) {
          return json.data.filter(function (item) {
            return item.stok > 0;
          });
        },
      },
      columns: [
        { data: "nama_produk" },
        {
          data: "harga",
          render: function (data) {
            return parseInt(data).toLocaleString("id-ID");
          },
        },
        { data: "stok" },
      ],
      language: {
        emptyTable: "Tidak ada data",
        lengthMenu: "Tampilkan _MENU_ data per halaman",
        info: "Menampilkan _START_ - _END_ dari _TOTAL_ data",
        search: "Cari:",
        zeroRecords: "Data tidak ditemukan",
        infoEmpty: "Menampilkan 0 data",
        infoFiltered: "(disaring dari _MAX_ total data)",
      },
    });

    $("#lov_produk tbody").on("click", "tr", function () {
      const row = lov_produk.row(this);
      const data = row.data();

      const isExist = produk
        .rows()
        .data()
        .toArray()
        .some((rowData) => rowData.id_produk === data.id_produk);

      if (isExist) {
        Swal.fire({
          icon: `info`,
          title: `Produk sudah ditambahkan !!!`,
          showConfirmButton: false,
          timer: 2000,
        });
        return;
      }

      data.jumlah = 1;
      data.worker = null;
      data.total = data.harga * data.jumlah;
      produk.row.add(data).draw();
      $("#lovProduk").modal("hide");
    });

    const produk = $("#produk").DataTable({
      paging: false,
      ordering: false,
      searching: false,
      scrollY: "400px",
      scrollCollapse: true,
      columns: [
        { data: "nama_produk" },
        {
          data: "harga",
          render: (data) => parseInt(data).toLocaleString("id-ID"),
        },
        {
          data: "jumlah",
          render: function (data, type, row, meta) {
            if (row.jenis.toUpperCase() === "JASA") {
              return data;
            } else {
              return `<input type="number" class="form-control form-control-sm jumlah-input"
                     data-row="${meta.row}" value="${data}" min="0" style="width: 80px;" />`;
            }
          },
        },
        {
          data: "worker",
          render: function (data, type, row) {
            if (row.jenis.toUpperCase() === "JASA") {
              return `<input type="text" class="form-control form-control-sm worker-input" value="${
                data || ""
              }" oninput="this.value = this.value.toUpperCase();"/>`;
            } else {
              return data || "-";
            }
          },
        },
        {
          data: "total",
          render: (data) => parseInt(data).toLocaleString("id-ID"),
        },
        {
          data: null,
          render: function (data, type, row, meta) {
            return `<button class="btn btn-sm btn-danger delete-btn"
              data-nama="${row.nama_produk}">Hapus</button>`;
          },
        },
      ],
      language: {
        emptyTable: "Tidak ada data",
        lengthMenu: "Tampilkan _MENU_ data per halaman",
        info: "Menampilkan _START_ - _END_ dari _TOTAL_ data",
        search: "Cari:",
        zeroRecords: "Data tidak ditemukan",
        infoEmpty: "Menampilkan 0 data",
        infoFiltered: "(disaring dari _MAX_ total data)",
      },
    });

    $("#produk")
      .DataTable()
      .on("draw", function () {
        let total = $("#produk")
          .DataTable()
          .column(4, { search: "applied" })
          .data()
          .reduce((a, b) => a + parseInt(b || 0), 0);
        $("#total_harga").val(total.toLocaleString("id-ID"));
      });

    $("#produk tbody").on("change", ".worker-input", function () {
      const tr = $(this).closest("tr");
      const row = produk.row(tr);
      const data = row.data();
      const newValue = $(this).val();
      data.worker = newValue;
      row.data(data).draw(false);
    });

    $("#produk tbody").on("change", ".jumlah-input", function () {
      const tr = $(this).closest("tr");
      const row = produk.row(tr);
      const data = row.data();
      const newValue = parseInt($(this).val()) || 0;
      if (newValue > data.stok || newValue < 1) {
        Swal.fire({
          icon: `warning`,
          title: `Jumlah tidak boleh 0 atau melebihi stok !!!`,
          showConfirmButton: false,
          timer: 1000,
        });
        $(this).val(data.jumlah);
      } else {
        data.jumlah = newValue;
        data.total = data.harga * newValue;
      }
      row.data(data).draw(false);
    });

    $("#produk tbody").on("click", ".delete-btn", function () {
      const row = produk.row($(this).closest("tr"));
      const nama_produk = $(this).data("nama");
      Swal.fire({
        title: "Yakin?",
        text: `Ingin menghapus produk ${nama_produk} ?`,
        type: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Iya, hapus !!!",
        cancelButtonText: "Batal",
      }).then((result) => {
        row.remove().draw();
      });
    });

    $("#nopol").on("change", function () {
      const nopol = $("#nopol").val();
      const daftar = JSON.parse(`{{ daftar | tojson }}`);
      const ada = daftar.find((item) => item.nopol === nopol);
      if (ada) {
        $("#nama_pelanggan").val(ada.nama_pelanggan);
        $("#nama_kendaraan").val(ada.nama_kendaraan);
        $("#no_hp").val(ada.no_hp);
      }
    });
  });

  document
    .querySelectorAll("#nama_pelanggan, #nama_kendaraan, #no_hp")
    .forEach((el) => {
      el.addEventListener("input", () => {
        document.getElementById("edit").value = "T";
      });
    });

  async function simpanTransaksi() {
    let nopol = $("#nopol").val();
    let nama_pelanggan = $("#nama_pelanggan").val();
    let nama_kendaraan = $("#nama_kendaraan").val();
    let no_hp = $("#no_hp").val();
    let total_harga = getAngkaAsli($("#total_harga").val());
    let status_bayar = $("#status_bayar").val();
    let edit = $("#edit").val();
    let details = $("#produk").DataTable().rows().data().toArray();

    if (
      !nopol ||
      !nama_pelanggan ||
      !nama_kendaraan ||
      !status_bayar ||
      !details.length
    ) {
      Swal.fire({
        icon: `warning`,
        title: `Data Transaksi tidak lengkap !!!`,
        showConfirmButton: false,
        timer: 2000,
      });
      return;
    }

    $.ajax({
      url: "/kasir/simpan-transaksi", // Endpoint Flask
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({
        nopol,
        nama_pelanggan,
        nama_kendaraan,
        no_hp,
        total_harga,
        status_bayar,
        edit,
        details,
      }),
      success: async function (response) {
        if (response.status) {
          await Swal.fire({
            icon: `success`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
          location.reload();
        } else {
          Swal.fire({
            icon: `warning`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
        }
      },
      error: function (xhr) {
        Swal.fire({
          icon: `warning`,
          title: `Terjadi kesalahan saat menyimpan transaksi !!!`,
          showConfirmButton: false,
          timer: 2000,
        });
      },
    });
  }
</script>
{% endblock %}
