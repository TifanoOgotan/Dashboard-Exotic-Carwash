<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exotic Carwash</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='plugin/bootstrap/css/bootstrap.min.css') }}"
    />
    <script src="{{ url_for('static', filename='plugin/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

    <!-- Swal Fire -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='plugin/sweetalert2/sweetalert2.min.css') }}"
    />
    <script src="{{ url_for('static', filename='plugin/sweetalert2/sweetalert2.min.js') }}"></script>

    <style>
      body,
      html {
        height: 100%;
        background-color: white;
      }
      .container-login {
        height: calc(100vh - 56px);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4rem;
        padding: 2rem;
      }
      .logo-container img {
        max-width: 320px;
        height: auto;
        user-select: none;
        pointer-events: none;
      }
      .login-box {
        background-color: #a2d2f5;
        padding: 2rem 2.5rem;
        border-radius: 12px;
        min-width: 300px;
        box-shadow: 0 0 8px rgb(0 0 0 / 0.15);
      }
      .login-box h2 {
        font-weight: 600;
        margin-bottom: 1.5rem;
        text-align: center;
        color: #222;
      }
      .form-label {
        font-size: 0.875rem;
        color: #222;
      }
      .form-control {
        margin-bottom: 1rem;
      }

      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: #222;
        color: white;
        text-align: center;
        padding: 10px 0;
      }

      /* Responsive for small screens */
      /* Responsive for small screens - portrait */
      @media (max-width: 576px) and (orientation: portrait) {
        .container-login {
          flex-direction: column;
          gap: 2rem;
          padding: 1rem;
          height: auto;
        }
        .logo-container img {
          max-width: 80vw;
          height: auto;
        }
        .login-box {
          width: 100%;
          min-width: unset;
          padding: 1.5rem 1.5rem;
          box-shadow: none;
        }
      }

      /* Responsive for small screens - landscape */
      @media (max-width: 767px) and (orientation: landscape) {
        .container-login {
          flex-direction: row; /* Bisa row agar logo dan login berdampingan */
          gap: 1.5rem;
          padding: 1rem 2rem;
          height: auto;
          justify-content: center;
        }
        .logo-container img {
          max-width: 40vw;
          height: auto;
        }
        .login-box {
          width: 50vw;
          min-width: unset;
          padding: 2rem;
          box-shadow: 0 0 8px rgb(0 0 0 / 0.1);
        }
      }
    </style>
  </head>

  <body>
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %} {% for category, message in messages %}
    <script>
      Swal.fire({
        icon: `{{ 'success' if category == 'success' 
                    else 'info' if category == 'info'
                    else 'warning' if category == 'warning' or category == 'unauthorized'
                    else 'error' }}`,
        title: `{{ message }}`,
        showConfirmButton: false,
        timer: 2000,
      });
    </script>
    {% endfor %} {% endif %} {% endwith %}

    <div class="container container-login">
      <div
        class="logo-container d-flex align-items-center justify-content-center"
      >
        <img src="{{ url_for('static', filename='images/Logo.jpg') }}" />
      </div>

      <div class="login-box">
        <h2>Login</h2>
        <form method="POST">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            class="form-control"
            placeholder="Enter username"
            required
          />

          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
          <button type="submit" class="btn btn-light w-100">Submit</button>
        </form>
      </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <div class="container">
        <small>&copy; 2025 | Exotic Carwash & SPA. All rights reserved.</small>
      </div>
    </footer>
  </body>
</html>
