{% extends 'base.html' %} {% block content %}
<h2>Produk</h2>
<hr />
<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-3"></div>
      <div class="col-6" style="justify-items: center">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            id="cari_produk"
            placeholder="Cari Produk"
          />
        </div>
      </div>
      <div class="col-3" style="text-align: right">
        <button
          type="button"
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#tambahModal"
        >
          Tambah Produk
        </button>
      </div>
    </div>
  </div>
  <div class="card-body">
    <table
      id="produk"
      class="display table table-light table-striped-columns"
      style="width: 100%"
    >
      <thead>
        <tr>
          <th>ID Produk</th>
          <th>Nama Produk</th>
          <th>Jenis</th>
          <th>Harga</th>
          <th>Stok</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal Tambah Produk-->
<div
  class="modal fade"
  id="tambahModal"
  tabindex="-1"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Tambah Data Produk</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="row mb-3">
          <label
            for="t_nama_produk"
            class="col-sm-3 col-form-label"
            style="text-align: right"
            >Nama Produk</label
          >
          <div class="col-sm-7">
            <input
              type="text"
              class="form-control"
              id="t_nama_produk"
              placeholder="Nama Produk"
              oninput="this.value = this.value.toUpperCase();"
            />
          </div>
        </div>
        <div class="row mb-3">
          <label
            for="t_jenis"
            class="col-sm-3 col-form-label"
            style="text-align: right"
            >Jenis</label
          >
          <div class="col-sm-7">
            <select class="form-select" id="t_jenis">
              <option selected disabled>-- Pilih Jenis --</option>
              <option value="BARANG">Barang</option>
              <option value="JASA">Jasa</option>
            </select>
          </div>
        </div>
        <div class="row mb-3">
          <label
            for="t_harga"
            class="col-sm-3 col-form-label"
            style="text-align: right"
            >Harga</label
          >
          <div class="col-sm-7">
            <input
              type="text"
              class="form-control"
              id="t_harga"
              placeholder="Harga"
              oninput="formatRupiah(this)"
            />
          </div>
        </div>
        <div class="row">
          <label
            for="t_stok"
            class="col-sm-3 col-form-label"
            style="text-align: right"
            >Stok</label
          >
          <div class="col-sm-7">
            <input
              type="number"
              class="form-control"
              id="t_stok"
              placeholder="Stok"
            />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success" onclick="simpan()">
          Simpan
        </button>
      </div>
    </div>
  </div>
</div>

<div
  class="modal fade"
  id="editModal"
  tabindex="-1"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <form id="editForm">
        <div class="modal-header">
          <h5 class="modal-title">Edit Produk</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit_id_produk" name="id_produk" />
          <div class="row mb-3">
            <label
              for="edit_nama_produk"
              class="col-sm-3 col-form-label"
              style="text-align: right"
              >Nama Produk</label
            >
            <div class="col-sm-7">
              <input
                type="text"
                class="form-control"
                id="edit_nama_produk"
                name="nama_produk"
                readonly
                disabled
              />
            </div>
          </div>
          <div class="row mb-3">
            <label
              for="edit_jenis"
              class="col-sm-3 col-form-label"
              style="text-align: right"
              >Jenis</label
            >
            <div class="col-sm-7">
              <input
                type="text"
                class="form-control"
                id="edit_jenis"
                name="jenis"
                readonly
                disabled
              />
            </div>
          </div>
          <div class="row mb-3">
            <label
              for="edit_harga"
              class="col-sm-3 col-form-label"
              style="text-align: right"
              >Harga</label
            >
            <div class="col-sm-7">
              <input
                type="text"
                class="form-control"
                id="edit_harga"
                oninput="formatRupiah(this)"
              />
            </div>
          </div>
          <div class="row mb-3">
            <label
              for="edit_stok"
              class="col-sm-3 col-form-label"
              style="text-align: right"
              >Stok</label
            >
            <div class="col-sm-7">
              <input
                type="number"
                class="form-control"
                id="edit_stok"
                name="stok"
                required
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" onclick="simpanEdit()">
            Simpan
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %} {% block script %}
<script>
  $(document).ready(function () {
    const table_produk = $("#produk").DataTable({
      dom: "lrtip", // hilangkan search default
      scrollY: "400px",
      scrollCollapse: true,
      paging: false,
      processing: true,
      serverSide: false, // jika ingin server-side true, tinggal ubah ini dan backendnya
      ajax: {
        url: "/produk/data",
        type: "POST",
      },
      columns: [
        { data: "id_produk" },
        { data: "nama_produk" },
        { data: "jenis" },
        {
          data: "harga",
          render: function (data) {
            return parseInt(data).toLocaleString("id-ID");
          },
        },
        { data: "stok" },
        {
          data: null,
          orderable: false,
          searchable: false,
          render: function (data, type, row) {
            return `
            <button class="btn btn-sm btn-warning edit-btn"
              data-id="${row.id_produk}"
              data-nama="${row.nama_produk}"
              data-jenis="${row.jenis}"
              data-harga="${row.harga}"
              data-stok="${row.stok}"
              data-bs-toggle="modal"
              data-bs-target="#editModal">Edit</button>
            <button class="btn btn-sm btn-danger delete-btn"
              data-id="${row.id_produk}"
              data-nama="${row.nama_produk}">Hapus</button>`;
          },
        },
      ],
      language: {
        decimal: "",
        emptyTable: "Tidak ada data yang tersedia pada tabel ini",
        info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
        infoEmpty: "Menampilkan 0 sampai 0 dari 0 data",
        infoFiltered: "(disaring dari _MAX_ total data)",
        lengthMenu: "Tampilkan _MENU_ data",
        loadingRecords: "Memuat...",
        processing: "Memproses...",
        search: "Cari:",
        zeroRecords: "Tidak ditemukan data yang sesuai",
        aria: {
          sortAscending: ": aktifkan untuk mengurutkan kolom secara menaik",
          sortDescending: ": aktifkan untuk mengurutkan kolom secara menurun",
        },
      },
    });

    $("#produk").on("click", ".edit-btn", function () {
      const btn = $(this);
      $("#edit_id_produk").val(btn.data("id"));
      $("#edit_nama_produk").val(btn.data("nama"));
      $("#edit_jenis").val(btn.data("jenis"));
      $("#edit_harga").val(parseInt(btn.data("harga")).toLocaleString("id-ID"));
      $("#edit_stok").val(btn.data("stok"));
    });

    $.fn.dataTable.ext.search.push((settings, data) => {
      const val = $("#cari_produk").val().toLowerCase();
      return (
        !val ||
        data[0].toLowerCase().includes(val) ||
        data[1].toLowerCase().includes(val) ||
        data[2].toLowerCase().includes(val)
      );
    });

    $("#cari_produk").on("keyup", () => table_produk.draw());

    $("#produk").on("click", ".delete-btn", function () {
      const id = $(this).data("id");
      const nama_produk = $(this).data("nama");
      Swal.fire({
        title: "Yakin?",
        text: `Ingin menghapus produk ${nama_produk} ?`,
        type: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Iya, hapus !!!",
        cancelButtonText: "Batal",
      }).then((result) => {
        if (result.value) {
          $.ajax({
            url: `/produk/delete/${id}`,
            type: "POST",
            success: function (response) {
              if (response.status) {
                Swal.fire({
                  icon: `success`,
                  title: response.message,
                  showConfirmButton: false,
                  timer: 2000,
                });
                table_produk.ajax.reload();
              } else {
                Swal.fire({
                  icon: `warning`,
                  title: response.message,
                  showConfirmButton: false,
                  timer: 2000,
                });
              }
            },
            error: function () {
              Swal.fire({
                icon: `warning`,
                title: `Terjadi kesalahan saat menghapus produk !!!`,
                showConfirmButton: false,
                timer: 2000,
              });
            },
          });
        }
      });
    });
  });

  async function simpanEdit() {
    let id_produk = $("#edit_id_produk").val();
    let nama_produk = $("#edit_nama_produk").val();
    let jenis = $("#edit_jenis").val();
    let harga = getAngkaAsli($("#edit_harga").val());
    let stok = $("#edit_stok").val();

    if (!nama_produk || !jenis || !harga || !stok) {
      Swal.fire({
        icon: `warning`,
        title: `Data produk tidak lengkap !!!`,
        showConfirmButton: false,
        timer: 2000,
      });
      return;
    }

    $.ajax({
      url: "/produk/update-produk", // Endpoint Flask
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({ id_produk, nama_produk, jenis, harga, stok }),
      success: async function (response) {
        if (response.status) {
          await Swal.fire({
            icon: `success`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
          await $("#produk").DataTable().ajax.reload();
          $("#editModal").modal("hide");
        } else {
          Swal.fire({
            icon: `warning`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
        }
      },
      error: function (xhr) {
        Swal.fire({
          icon: `warning`,
          title: `Terjadi kesalahan saat mengupdate produk !!!`,
          showConfirmButton: false,
          timer: 2000,
        });
      },
    });
  }

  async function simpan() {
    let nama_produk = $("#t_nama_produk").val();
    let jenis = $("#t_jenis").val();
    let harga = getAngkaAsli($("#t_harga").val());
    let stok = $("#t_stok").val();

    if (!nama_produk || !jenis || !harga || !stok) {
      Swal.fire({
        icon: `warning`,
        title: `Data produk tidak lengkap !!!`,
        showConfirmButton: false,
        timer: 2000,
      });
      return;
    }

    $.ajax({
      url: "/produk/tambah-produk", // Endpoint Flask
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({ nama_produk, jenis, harga, stok }),
      success: async function (response) {
        if (response.status) {
          await Swal.fire({
            icon: `success`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
          await $("#produk").DataTable().ajax.reload();
          $("#tambahModal").modal("hide");
        } else {
          Swal.fire({
            icon: `warning`,
            title: response.message,
            showConfirmButton: false,
            timer: 2000,
          });
        }
      },
      error: function (xhr) {
        Swal.fire({
          icon: `warning`,
          title: `Terjadi kesalahan saat menambahkan produk !!!`,
          showConfirmButton: false,
          timer: 2000,
        });
      },
    });
  }
</script>
{% endblock %}
